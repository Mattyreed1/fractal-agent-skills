<!--
  LAYOUT: Comparison / Before-After / Two-Column
  USE FOR: Contrasting approaches, before/after, old vs new
  STRUCTURE: Headline (56px) → Two columns or stacked sections → Footer
  ALIGNMENT: Left-aligned

  PLACEHOLDERS:
  - {{HEADLINE}} — Slide headline (56px)
  - {{LEFT_LABEL}} — Left column label (e.g., "BEFORE", "WRONG", "OLD WAY")
  - {{RIGHT_LABEL}} — Right column label (e.g., "AFTER", "RIGHT", "NEW WAY")
  - {{LEFT_ITEMS}} / {{RIGHT_ITEMS}} — Content for each side
  - {{WIDTH}} / {{HEIGHT}} — Canvas dimensions
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;700;800&family=Silkscreen:wght@400;700&display=swap');

  
  
  
  :root {
    --bg: #09090b; --surface: #111113; --border: #1c1c22;
    --text: #fafafa; --text-muted: #71717a; --text-dim: #3f3f46;
    --accent-emerald: #10b981; --accent-blue: #3b82f6; --accent-amber: #f59e0b; --accent-pink: #ec4899; --glass-bg: rgba(17, 17, 19, 0.55); --glass-border: rgba(255, 255, 255, 0.12); --glass-blur: 18px;
    --negative: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: {{WIDTH}}px; height: {{HEIGHT}}px; overflow: hidden; background-color: var(--bg); background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><rect x='0' y='0' width='2' height='2' fill='%23ffffff' fill-opacity='0.14'/></svg>"); background-size: 24px 24px; background-position: 12px 12px; color: var(--text); font-family: 'Geist', sans-serif; }
  .canvas { width: 100%; height: 100%; padding: 64px 64px 28px; display: flex; flex-direction: column; justify-content: space-between; }

  .main { display: flex; flex-direction: column; gap: 40px; }

  .headline {
    font-family: 'Geist', sans-serif;
    font-size: 56px;
    font-weight: bold;
    line-height: 1.08;
    color: var(--text);
  }

  .columns { display: flex; gap: 24px; }

  .column {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0;
    overflow: hidden;
  }

  .column-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .column-label {
    font-family: 'Geist Mono', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .column-label.negative { color: var(--negative); }
  .column-label.positive { color: var(--accent-emerald); }

  .column-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

  .column-item {
    font-family: 'Geist', sans-serif;
    font-size: 24px;
    line-height: 1.45;
    color: var(--text-muted);
    padding-left: 20px;
    position: relative;
  }

  .column-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .column.right .column-item { color: var(--text); }
  .column.right .column-item::before { background: var(--accent-emerald); }

  .bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
  .bottom-note { font-family: 'Geist Mono', monospace; font-size: 22px; color: var(--text-muted); letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="main">
      <h2 class="headline">{{HEADLINE}}</h2>
      <div class="columns">
        <div class="column left">
          <div class="column-header">
            <div class="column-label negative">{{LEFT_LABEL}}</div>
          </div>
          <div class="column-body">
            <div class="column-item">Left item 1</div>
            <div class="column-item">Left item 2</div>
            <div class="column-item">Left item 3</div>
          </div>
        </div>
        <div class="column right">
          <div class="column-header">
            <div class="column-label positive">{{RIGHT_LABEL}}</div>
          </div>
          <div class="column-body">
            <div class="column-item">Right item 1</div>
            <div class="column-item">Right item 2</div>
            <div class="column-item">Right item 3</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <img src="logo.png" style="height:56px; width:auto; opacity:0.9;">
      <div class="bottom-note">fractalai.agency</div>
    </div>
  </div>
</body>
</html>
