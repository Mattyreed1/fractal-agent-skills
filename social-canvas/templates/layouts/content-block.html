<!--
  LAYOUT: Content Block — Detail/explanation slide
  USE FOR: Explaining a concept with a section label + emoji + text + data viz
  STRUCTURE: Section label (text-muted) → Emoji (64px) → Headline (56px) → Body (30px) → Data element → Footer
  ALIGNMENT: Left-aligned

  PLACEHOLDERS:
  - {{SECTION_LABEL}} — Short label in text-muted (e.g., "THE GAP", "THE FRAMEWORK")
  - {{EMOJI}} — Single emoji
  - {{HEADLINE}} — Slide headline (56px, max ~10 words)
  - {{DESCRIPTION}} — Supporting text (30px, 1-2 lines)
  - {{ACCENT}} — Optional CSS var for key concept highlighting (e.g., --accent-emerald, --text)
  - {{DATA_VIZ}} — Zone for code block, card list, terminal, flow steps, etc.
  - {{WIDTH}} / {{HEIGHT}} — Canvas dimensions
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;700;800&family=Silkscreen:wght@400;700&display=swap');

  
  
  
  
  :root {
    --bg: #09090b; --surface: #111113; --border: #1c1c22;
    --text: #fafafa; --text-muted: #71717a; --text-dim: #3f3f46;
    --accent-emerald: #10b981; --accent-blue: #3b82f6; --accent-amber: #f59e0b; --accent-pink: #ec4899; --glass-bg: rgba(17, 17, 19, 0.55); --glass-border: rgba(255, 255, 255, 0.12); --glass-blur: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: {{WIDTH}}px; height: {{HEIGHT}}px; overflow: hidden; background-color: var(--bg); background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><rect x='0' y='0' width='2' height='2' fill='%23ffffff' fill-opacity='0.14'/></svg>"); background-size: 24px 24px; background-position: 12px 12px; color: var(--text); font-family: 'Geist', sans-serif; }
  .canvas { width: 100%; height: 100%; padding: 64px 64px 28px; display: flex; flex-direction: column; justify-content: space-between; }

  /* ── Section label (monochrome — NOT colored) ── */
  .section-label {
    font-family: 'Geist Mono', monospace;
    font-size: 20px;
    color: var(--text-muted);
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  /* ── Content area ── */
  .content { display: flex; flex-direction: column; gap: 24px; }
  .emoji-row { font-size: 64px; }
  .title { font-family: 'Geist', sans-serif; font-size: 56px; font-weight: bold; line-height: 1.08; color: var(--text); }
  .description { font-family: 'Geist', sans-serif; font-size: 30px; line-height: 1.45; color: var(--text-muted); }

  /* ── Data visualization zone ── */
  /* Replace with the appropriate pattern: code-block, card-list, terminal, flow-steps */

  /* Pattern A: Code/Key-Value Block */
  .code-block { background: var(--surface); border: 1px solid var(--border); border-radius: 0; padding: 28px 32px; display: flex; flex-direction: column; gap: 12px; }
  .code-line { font-family: 'Geist Mono', monospace; font-size: 24px; line-height: 1.6; color: var(--text-muted); }
  .code-line .key { color: var({{ACCENT}}); }
  .code-line .val { color: var(--text); }
  .code-line .comment { color: var(--text-dim); }

  /* Pattern B: Card List */
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0; padding: 24px 32px; display: flex; flex-direction: column; gap: 6px; }
  .card-label { font-family: 'Geist Mono', monospace; font-size: 22px; color: var({{ACCENT}}); }
  .card-text { font-family: 'Geist', sans-serif; font-size: 26px; color: var(--text); font-style: italic; line-height: 1.4; }

  /* Pattern C: Terminal */
  .terminal { background: var(--surface); border: 1px solid var(--border); border-radius: 0; overflow: hidden; }
  .terminal-header { padding: 14px 24px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ef4444; } .dot.y { background: #f59e0b; } .dot.g { background: #10b981; }
  .terminal-body { padding: 28px 32px; display: flex; flex-direction: column; gap: 12px; }
  .term-line { font-family: 'Geist Mono', monospace; font-size: 24px; line-height: 1.6; color: var(--text-muted); }
  .term-line .key { color: var({{ACCENT}}); }
  .term-line .val { color: var(--text); }
  .term-line .comment { color: var(--text-dim); }

  /* Pattern D: Flow Steps */
  .flow { display: flex; flex-direction: column; gap: 0; }
  .flow-step { display: flex; align-items: center; gap: 24px; padding: 24px 32px; background: var(--surface); border: 1px solid var(--border); }
  .flow-step:first-child { border-radius: 0; }
  .flow-step:last-child { border-radius: 0; }
  .flow-step + .flow-step { border-top: none; }
  .flow-label { font-family: 'Geist Mono', monospace; font-size: 20px; color: var({{ACCENT}}); white-space: nowrap; min-width: 240px; }
  .flow-arrow { font-family: 'Geist Mono', monospace; font-size: 24px; color: var(--text-muted); flex-shrink: 0; }
  .flow-action { font-family: 'Geist', sans-serif; font-size: 26px; color: var(--text); line-height: 1.4; }

  .bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
  .bottom-note { font-family: 'Geist Mono', monospace; font-size: 22px; color: var(--text-muted); letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="section-label">{{SECTION_LABEL}}</div>

    <div class="content">
      <div class="emoji-row">{{EMOJI}}</div>
      <h2 class="title">{{HEADLINE}}</h2>
      <p class="description">{{DESCRIPTION}}</p>

      <!-- DATA VIZ: Choose ONE pattern below, delete the rest -->

      <!-- Pattern A: Code/Key-Value -->
      <div class="code-block">
        <div class="code-line"><span class="key">key:</span> <span class="val">value</span></div>
      </div>

      <!-- Pattern B: Card List -->
      <!--
      <div class="cards">
        <div class="card">
          <div class="card-label">Label</div>
          <div class="card-text">Description text here.</div>
        </div>
      </div>
      -->

      <!-- Pattern C: Terminal -->
      <!--
      <div class="terminal">
        <div class="terminal-header"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
        <div class="terminal-body">
          <div class="term-line"><span class="key">key:</span> <span class="val">value</span></div>
        </div>
      </div>
      -->

      <!-- Pattern D: Flow Steps -->
      <!--
      <div class="flow">
        <div class="flow-step">
          <div class="flow-label">Step Name</div>
          <div class="flow-arrow">→</div>
          <div class="flow-action">What happens</div>
        </div>
      </div>
      -->
    </div>

    <div class="bottom">
      <img src="logo.png" style="height:56px; width:auto; opacity:0.9;">
      <div class="bottom-note">fractalai.agency</div>
    </div>
  </div>
</body>
</html>
