<!--
  LAYOUT: CTA / Closing Slide
  USE FOR: Final slide — call to action, lead magnet, follow prompt
  STRUCTURE: Optional visual recap → Headline (56px) → Supporting text → CTA button/keyword → Footer
  ALIGNMENT: Center-aligned (exception to left-align rule)

  PLACEHOLDERS:
  - {{HEADLINE}} — Action-oriented headline (e.g., "Get all 4 files.")
  - {{SUBTITLE}} — Supporting context (e.g., "Set up in an hour.")
  - {{CTA_KEYWORD}} — The trigger word (e.g., "MOLTY", "STACK", "SHIP")
  - {{CTA_INSTRUCTION}} — What to do (e.g., "Comment 'MOLTY' below and I'll send them to you.")
  - {{VISUAL}} — Optional visual recap (e.g., summary list, key stat)
  - {{WIDTH}} / {{HEIGHT}} — Canvas dimensions
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;700;800&family=Silkscreen:wght@400;700&display=swap');

  
  
  
  :root {
    --bg: #09090b; --surface: #111113; --border: #1c1c22;
    --text: #fafafa; --text-muted: #71717a; --text-dim: #3f3f46;
    --accent-emerald: #10b981; --accent-blue: #3b82f6; --accent-amber: #f59e0b; --accent-pink: #ec4899; --glass-bg: rgba(17, 17, 19, 0.55); --glass-border: rgba(255, 255, 255, 0.12); --glass-blur: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: {{WIDTH}}px; height: {{HEIGHT}}px; overflow: hidden; background-color: var(--bg); background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><rect x='0' y='0' width='2' height='2' fill='%23ffffff' fill-opacity='0.14'/></svg>"); background-size: 24px 24px; background-position: 12px 12px; color: var(--text); font-family: 'Geist', sans-serif; }
  .canvas { width: 100%; height: 100%; padding: 64px 64px 28px; display: flex; flex-direction: column; justify-content: space-between; }

  /* ── Optional visual recap ── */
  .visual-recap {
    font-family: 'Geist Mono', monospace;
    font-size: 20px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Center-aligned CTA content ── */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 32px;
  }

  .cta-headline {
    font-family: 'Geist', sans-serif;
    font-size: 56px;
    font-weight: bold;
    line-height: 1.08;
    color: var(--text);
    max-width: 800px;
  }

  .cta-sub {
    font-family: 'Geist', sans-serif;
    font-size: 28px;
    line-height: 1.45;
    color: var(--text-muted);
    max-width: 720px;
  }

  .cta-keyword {
    display: inline-block;
    font-family: 'Geist Mono', monospace;
    font-size: 44px;
    color: var(--text);
    border: 2px solid var(--text);
    padding: 20px 64px;
    border-radius: 0;
    letter-spacing: 6px;
  }

  .cta-note {
    font-family: 'Geist', sans-serif;
    font-size: 26px;
    color: var(--text-muted);
  }
  .cta-note strong { color: var(--text); }

  .bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
  .bottom-note { font-family: 'Geist Mono', monospace; font-size: 22px; color: var(--text-muted); letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="canvas">
    <!-- VISUAL RECAP: Replace or remove. Example: a short text recap -->
    <div class="visual-recap">{{VISUAL}}</div>

    <div class="content">
      <h2 class="cta-headline">{{HEADLINE}}</h2>
      <p class="cta-sub">{{SUBTITLE}}</p>
      <div class="cta-keyword">{{CTA_KEYWORD}}</div>
      <p class="cta-note">{{CTA_INSTRUCTION}}</p>
    </div>

    <div class="bottom">
      <img src="logo.png" style="height:56px; width:auto; opacity:0.9;">
      <div class="bottom-note">fractalai.agency</div>
    </div>
  </div>
</body>
</html>
