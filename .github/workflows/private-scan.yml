name: private-scan

# Blocks any owner-specific / private data from reaching this public repo.
# Runs on every push and PR; fails the check if the scanner finds anything.
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Scan for private / owner-specific data
        run: python3 .github/scripts/private-scan.py --root .
